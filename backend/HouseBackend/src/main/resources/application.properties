spring.application.name=HouseBackend
# 数据库连接
spring.datasource.url=jdbc:mysql://localhost:3306/house_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# spring.datasource.password 在 secret.properties

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# TypeHandler 自动注册（加密字段）
mybatis.type-handlers-package=org.example.housebackend.typehandler

# 控制台输出 SQL（生产环境请注释掉）
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 邮件 SMTP 由 secret.properties 配置
spring.config.import=optional:secret.properties

# ========== AES 字段加密密钥（由 Jasypt 加密保护） ==========
# 需要设置环境变量 JASYPT_ENCRYPTOR_PASSWORD 才能启动
# 如未设置，应用将以明文模式运行（需 secret.properties 中也为明文）
app.encryption.aes-key=ENC(w72ZFWUwXFHeSJiwd5veMXBtV7yZp+piAVTNgkILZO3WfYoHQ3VZ/zTW5vdU3R1uVIM/SFysW7M=)