spring.application.name=HouseBackend
# 数据库连接
spring.datasource.url=jdbc:mysql://localhost:3306/house_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# spring.datasource.password 在 secret.properties

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# 控制台输出 SQL
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 邮件 SMTP 由 secret.properties 配置
spring.config.import=optional:secret.properties